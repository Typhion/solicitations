# Local dev layer — merge on top of docker-compose.yml with an explicit `-f`.
# Swaps the API to hot-reloading `dotnet watch` against bind-mounted source.
#
# Daily dev loop (or just run `make dev`):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d db api
#   cd frontend && npm start         # Angular dev server on :4200 with HMR (run natively)
#
# The `web` (nginx) service from the base file is still available for full-stack /
# prod-parity checks via `docker compose up --build web`, but isn't part of the inner loop.
services:
  api:
    build:
      context: ./backend
      target: build              # SDK stage from backend/Dockerfile (runs as root, has source)
    command: ["dotnet", "watch", "run", "--project", "WebApi/WebApi.csproj", "--no-launch-profile", "--urls", "http://+:8080"]
    environment:
      DOTNET_USE_POLLING_FILE_WATCHER: "true"   # required on macOS/Docker Desktop for file events
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "true"
    volumes:
      - ./backend:/src           # live source
      # anonymous volumes keep host (osx-arm64) bin/obj from clobbering the linux container build
      - /src/Domain/bin
      - /src/Domain/obj
      - /src/Application/bin
      - /src/Application/obj
      - /src/Infrastructure/bin
      - /src/Infrastructure/obj
      - /src/WebApi/bin
      - /src/WebApi/obj
