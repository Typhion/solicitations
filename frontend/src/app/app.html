<div class="flex min-h-screen flex-col">
  <nav class="border-border bg-surface flex items-center justify-between border-b px-6 py-3">
    <a
      class="text-foreground text-base font-semibold tracking-tight no-underline"
      routerLink="/solicitations"
    >
      Solicitations
    </a>

    <div class="flex items-center gap-2">
      <button
        type="button"
        class="text-muted hover:bg-surface-hover hover:text-foreground inline-flex h-8 w-8 items-center justify-center rounded-md transition-colors"
        [attr.aria-label]="theme.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
        (click)="theme.toggle()"
      >
        @if (theme.theme() === 'dark') {
          <!-- sun -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
            />
          </svg>
        } @else {
          <!-- moon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        }
      </button>

      @if (auth.isLoggedIn()) {
        <button
          type="button"
          [cdkMenuTriggerFor]="accountMenu"
          class="border-border text-foreground hover:bg-surface-hover focus-visible:ring-accent inline-flex h-8 items-center gap-1.5 rounded-md border px-2.5 text-sm font-medium transition-colors focus-visible:ring-2 focus-visible:outline-none"
        >
          Account
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m6 9 6 6 6-6" />
          </svg>
        </button>

        <ng-template #accountMenu>
          <div appMenu>
            <div class="text-muted px-2.5 py-1.5 text-xs font-medium">Signed in</div>
            <div appMenuSeparator></div>
            <button appMenuItem disabled>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              Profile
            </button>
            <button appMenuItem (triggered)="logout()">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <path d="m16 17 5-5-5-5M21 12H9" />
              </svg>
              Log out
            </button>
          </div>
        </ng-template>
      }
    </div>
  </nav>

  <main class="mx-auto w-full max-w-5xl flex-1 px-6 py-8">
    <router-outlet />
  </main>
</div>
